<div class="projects-container">
  <header>
    <h2>Mis Proyectos</h2>
    <button mat-flat-button color="primary" (click)="openCreateDialog()">
      + Nuevo Proyecto
    </button>
  </header>

  @if (isLoading()) {
    <div class="loading-state">
      <p>Cargando tus proyectos...</p>
    </div>
  } @else {
    <div class="projects-grid">
      @for (project of projects(); track project.id) {
        <article class="project-card">
          <div class="priority-badge" [attr.data-priority]="project.priority">
            P{{ project.priority }}
          </div>
          <h3>{{ project.name }}</h3>
          <p>{{ project.description }}</p>
          <div class="card-footer">
            <span>ID: #{{ project.id }}</span>
            <div class="actions">
              <button mat-button color="primary" (click)="openEditDialog(project)">Editar</button>
              <button mat-button color="warn" (click)="deleteProject(project)">Eliminar</button>
              <button mat-button color="accent">Ver detalles</button>
            </div>
          </div>
        </article>
      } @empty {
        <div class="empty-state">
          <p>Aún no tienes proyectos creados. ¡Empieza creando uno!</p>
          <button mat-stroked-button color="primary" (click)="openCreateDialog()">
            Crear primer proyecto
          </button>
        </div>
      }
    </div>
  }
</div>
